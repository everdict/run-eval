name: "Everdict Run Eval"
description: >-
  Fire an Everdict evaluation from CI. Pull requests run the topology with this build's image
  swapped in (ephemeral pins — registry untouched); /evaluate PR comments (issue_comment)
  do the same on demand, replying to the PR conversation — key=value arguments after the
  command tune that one fire (limit/tags/ids/trials/concurrency/retries/runtime/sink);
  pushes to dev/main re-pin the harness to a new immutable version (the "dev channel")
  and evaluate it.
author: "everdict"

inputs:
  api-url:
    description: "Everdict control-plane base URL (e.g. https://everdict.example.com)"
    required: true
  workspace:
    description: "Workspace slug (x-everdict-workspace)"
    required: true
  api-key:
    description: "Workspace API key (ak_…). Omit to use GitHub OIDC federation (keyless; requires a repo link in the workspace)"
    required: false
  harness:
    description: "Harness instance id"
    required: true
  dataset:
    description: "Dataset id"
    required: true
  images:
    description: 'JSON map of service slot → image ref, e.g. {"svc-x":"ghcr.io/acme/svc-x@sha256:…"}. PR: ephemeral pins. Push: durable re-pin.'
    required: false
  mode:
    description: "auto | pr | push (auto derives from the GitHub event)"
    required: false
    default: "auto"
  version:
    description: "Instance version for push re-pin (default dev-<short-sha>)"
    required: false
  allow-tags:
    description: "Allow non-digest (tag) image pins on push re-pin — for self-hosted/local/air-gapped registries where a digest isn't available. Default false (digest enforced)."
    required: false
    default: "false"
  runtime:
    description: "Workspace Runtime id to run on. A registered runtime id, a personal self-hosted runner (self:<runner-id>), or a workspace-shared runner co-located with this GitHub runner (self:ws:<runner-id>)."
    required: false
  judges:
    description: 'JSON array of judges, e.g. [{"id":"code-judge"}]'
    required: false
  baseline:
    description: "Baseline scorecard id (default: latest succeeded scorecard of the same dataset×harness)"
    required: false
  fail-on-regression:
    description: "Fail the job when the diff vs baseline has regressions (default true on PR, false on push)"
    required: false
  timeout-minutes:
    description: "Max minutes to wait for the scorecard to finish"
    required: false
    default: "30"
  head-sha:
    description: >-
      Evaluated commit sha. /evaluate comment fires run in default-branch context (GITHUB_SHA
      points at main), so the workflow resolves the checked-out PR head and passes it here.
      Defaults to GITHUB_SHA.
    required: false
  github-token:
    description: >-
      GitHub token for PR conversation feedback on /evaluate comment fires (pass github.token;
      needs issues/pull-requests write). Optional — without it feedback is skipped.
    required: false

outputs:
  scorecard-id:
    description: "The created scorecard id"
  status:
    description: "Terminal scorecard status (succeeded | failed)"
  regressions:
    description: "Number of regressions vs baseline (empty when no baseline)"

runs:
  using: "node20"
  main: "run-eval.mjs"
